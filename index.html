<!DOCTYPE html>
<html lang="it" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HybridDrive Tracker v3.2</title>
<script>window.tailwind={config:{darkMode:'class'}}</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiSHlicmlkRHJpdmUgVHJhY2tlciIsInNob3J0X25hbWUiOiJIeWJyaWREcml2ZSIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwZjE3MmEiLCJ0aGVtZV9jb2xvciI6IiMzYjgyZjYiLCJpY29ucyI6W3sic3JjIjoiZGF0YTppbWFnZS9wbmc7YmFzZTY0LGlWQk9SdzBLR2dvQUFBQU5TVWhFVWdBQUFBRUFBQUFCQ0FZQUFBQ0pFVGlVQUFBQzhVUlZCWEpYRmNJQVFBQUFMQkFBVUlDSWdBS1dVYWFDWDdFZndBQUFOQkxCTW9rQUFBQlZORTVWQlpqZ0FBQUFCbkpTVXJBV3pNT0R3Z0FBQUFCYk5NS0xoQzlERER5NkFBQUFBQklWT1JUYkczRU56REZ2a3N1M1lHbWdzRzZBbTVrcDVzc01EaDB6blFJZmdOZ0RaZzRXYmdkdzNmakVveVdrQT09Iiwic2l6ZXMiOiI1MTJ4NTEyIiwidHlwZSI6ImltYWdlL3BuZyJ9XX0=">
<meta name="theme-color" content="#3b82f6">
<style>
  :root {
    color-scheme: light dark;
  }
  .hidden{display:none!important}
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .animate-slide-up { animation: slideUp 0.3s ease-out; }
  .animate-fade-in { animation: fadeIn 0.2s ease-out; }
  dialog::backdrop {
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
  }
  dialog[open] {
    animation: slideUp 0.3s ease-out;
  }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans antialiased">
<div id="app" class="h-full flex flex-col max-w-5xl mx-auto">
  
  <!-- Header -->
  <header class="sticky top-0 z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
          <i data-lucide="car" class="w-5 h-5 text-white"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold leading-tight">HybridDrive</h1>
          <p class="text-xs text-slate-500 dark:text-slate-400">Tracker v3.2</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition">
          <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
      </div>
    </div>
    
    <!-- Tabs -->
    <nav class="px-2 flex gap-1 overflow-x-auto no-scrollbar">
      <button data-tab="nuovo" class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition whitespace-nowrap">Nuovo</button>
      <button data-tab="storico" class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition whitespace-nowrap">Storico</button>
      <button data-tab="auto" class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition whitespace-nowrap">Auto</button>
      <button data-tab="bollette" class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition whitespace-nowrap">Bollette</button>
      <button data-tab="statistiche" class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition whitespace-nowrap">Statistiche</button>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto pb-24">
    <div id="content" class="p-4"></div>
  </main>

  <!-- FAB -->
  <button id="fab" class="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 text-white shadow-xl shadow-blue-500/40 flex items-center justify-center hover:scale-105 active:scale-95 transition-transform z-20">
    <i data-lucide="plus" class="w-6 h-6"></i>
  </button>

  <!-- Dialogs -->
  <dialog id="carDialog" class="rounded-2xl p-0 w-full max-w-md bg-white dark:bg-slate-800 shadow-2xl">
    <form id="carForm" method="dialog" class="p-6">
      <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i data-lucide="car" class="w-5 h-5 text-blue-500"></i>
        Nuova Auto
      </h3>
      <div class="space-y-4">
        <div>
          <label class="text-sm font-medium block mb-1.5">Nome Auto</label>
          <input name="name" required type="text" placeholder="Es. Toyota Prius" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm font-medium block mb-1.5">Targa</label>
            <input name="plate" required type="text" placeholder="AB123CD" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition uppercase">
          </div>
          <div>
            <label class="text-sm font-medium block mb-1.5">Capacità kWh</label>
            <input name="battery" required type="number" step="0.1" placeholder="8.8" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
          </div>
        </div>
        <div>
          <label class="text-sm font-medium block mb-1.5">Costo €/kWh</label>
          <input name="costKwh" required type="number" step="0.001" placeholder="0.25" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="button" id="cancelCar" class="flex-1 px-4 py-2.5 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 font-medium transition">Annulla</button>
        <button type="submit" class="flex-1 px-4 py-2.5 rounded-lg bg-blue-500 hover:bg-blue-600 text-white font-medium transition">Salva</button>
      </div>
    </form>
  </dialog>

  <dialog id="tripDialog" class="rounded-2xl p-0 w-full max-w-md bg-white dark:bg-slate-800 shadow-2xl">
    <form id="tripForm" method="dialog" class="p-6">
      <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i data-lucide="route" class="w-5 h-5 text-blue-500"></i>
        Nuovo Viaggio
      </h3>
      <div class="space-y-4">
        <div>
          <label class="text-sm font-medium block mb-1.5">Auto</label>
          <select name="carId" required class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
            <option value="">Seleziona auto</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm font-medium block mb-1.5">Data</label>
            <input name="date" required type="date" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
          </div>
          <div>
            <label class="text-sm font-medium block mb-1.5">Km Percorsi</label>
            <input name="km" required type="number" step="0.1" placeholder="42.5" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
          </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm font-medium block mb-1.5">kWh Usati</label>
            <input name="kwh" required type="number" step="0.01" placeholder="6.2" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
          </div>
          <div>
            <label class="text-sm font-medium block mb-1.5">Litri Benzina</label>
            <input name="fuel" required type="number" step="0.01" placeholder="1.5" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
          </div>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="button" id="cancelTrip" class="flex-1 px-4 py-2.5 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 font-medium transition">Annulla</button>
        <button type="submit" class="flex-1 px-4 py-2.5 rounded-lg bg-blue-500 hover:bg-blue-600 text-white font-medium transition">Salva</button>
      </div>
    </form>
  </dialog>

  <dialog id="billDialog" class="rounded-2xl p-0 w-full max-w-md bg-white dark:bg-slate-800 shadow-2xl">
    <form id="billForm" method="dialog" class="p-6">
      <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i data-lucide="receipt" class="w-5 h-5 text-blue-500"></i>
        Nuova Bolletta
      </h3>
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm font-medium block mb-1.5">Data</label>
            <input name="date" required type="date" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
          </div>
          <div>
            <label class="text-sm font-medium block mb-1.5">Importo €</label>
            <input name="amount" required type="number" step="0.01" placeholder="85.50" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
          </div>
        </div>
        <div>
          <label class="text-sm font-medium block mb-1.5">kWh Totali</label>
          <input name="kwh" required type="number" step="0.1" placeholder="320" class="w-full px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="button" id="cancelBill" class="flex-1 px-4 py-2.5 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 font-medium transition">Annulla</button>
        <button type="submit" class="flex-1 px-4 py-2.5 rounded-lg bg-blue-500 hover:bg-blue-600 text-white font-medium transition">Salva</button>
      </div>
    </form>
  </dialog>

</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  
  // Error boundary
  window.addEventListener('error',e=>{
    document.body.innerHTML=`<div class='p-4 text-red-500'>Errore: ${e.message}</div>`;
  });

  // State management
  const store={
    load(){
      return JSON.parse(localStorage.getItem('hd32')||'{"cars":[],"trips":[],"bills":[],"activeTab":"nuovo"}')
    },
    save(s){
      localStorage.setItem('hd32',JSON.stringify(s))
    }
  };
  
  let state = store.load();
  
  // Theme
  const themeToggle = document.getElementById('themeToggle');
  const initTheme = () => {
    if(localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
    lucide.createIcons();
  };
  
  themeToggle.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
    lucide.createIcons();
  });
  
  initTheme();

  // Dialog elements
  const carDialog = document.getElementById('carDialog');
  const tripDialog = document.getElementById('tripDialog');
  const billDialog = document.getElementById('billDialog');
  
  document.getElementById('cancelCar').addEventListener('click', () => carDialog.close());
  document.getElementById('cancelTrip').addEventListener('click', () => tripDialog.close());
  document.getElementById('cancelBill').addEventListener('click', () => billDialog.close());
  
  // Forms
  document.getElementById('carForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const car = {
      id: Date.now().toString(),
      name: fd.get('name'),
      plate: fd.get('plate').toUpperCase(),
      battery: parseFloat(fd.get('battery')),
      costKwh: parseFloat(fd.get('costKwh'))
    };
    state.cars.push(car);
    store.save(state);
    carDialog.close();
    e.target.reset();
    render();
  });
  
  document.getElementById('tripForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const trip = {
      id: Date.now().toString(),
      carId: fd.get('carId'),
      date: fd.get('date'),
      km: parseFloat(fd.get('km')),
      kwh: parseFloat(fd.get('kwh')),
      fuel: parseFloat(fd.get('fuel'))
    };
    if(!state.trips) state.trips = [];
    state.trips.unshift(trip);
    store.save(state);
    tripDialog.close();
    e.target.reset();
    render();
  });
  
  document.getElementById('billForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const bill = {
      id: Date.now().toString(),
      date: fd.get('date'),
      amount: parseFloat(fd.get('amount')),
      kwh: parseFloat(fd.get('kwh'))
    };
    state.bills.unshift(bill);
    store.save(state);
    billDialog.close();
    e.target.reset();
    render();
  });

  // Tabs
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      state.activeTab = btn.dataset.tab;
      store.save(state);
      render();
    });
  });
  
  // FAB
  const fab = document.getElementById('fab');
  fab.addEventListener('click', () => {
    if(state.activeTab === 'auto') carDialog.showModal();
    else if(state.activeTab === 'bollette') billDialog.showModal();
    else tripDialog.showModal();
  });
  
  // Delete functions
  window.deleteCar = (id) => {
    if(confirm('Eliminare questa auto?')) {
      state.cars = state.cars.filter(c => c.id !== id);
      if(state.trips) state.trips = state.trips.filter(t => t.carId !== id);
      store.save(state);
      render();
    }
  };
  
  window.deleteTrip = (id) => {
    if(confirm('Eliminare questo viaggio?')) {
      state.trips = state.trips.filter(t => t.id !== id);
      store.save(state);
      render();
    }
  };
  
  window.deleteBill = (id) => {
    if(confirm('Eliminare questa bolletta?')) {
      state.bills = state.bills.filter(b => b.id !== id);
      store.save(state);
      render();
    }
  };
  
  // Render functions
  const content = document.getElementById('content');
  
  const renderNuovo = () => {
    fab.querySelector('i').setAttribute('data-lucide', 'plus');
    lucide.createIcons();
    const recentTrips = (state.trips||[]).slice(0,5);
    const totalKm = (state.trips||[]).reduce((a,b)=>a+b.km,0);
    const totalKwh = (state.trips||[]).reduce((a,b)=>a+b.kwh,0);
    const totalFuel = (state.trips||[]).reduce((a,b)=>a+b.fuel,0);
    const avgConsumption = totalKm > 0 ? (totalKwh / totalKm * 100).toFixed(2) : 0;
    
    if((state.cars||[]).length === 0) {
      content.innerHTML = `
        <div class="text-center py-16 animate-fade-in">
          <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center">
            <i data-lucide="car" class="w-10 h-10 text-white"></i>
          </div>
          <h2 class="text-2xl font-bold mb-2">Benvenuto in HybridDrive</h2>
          <p class="text-slate-500 dark:text-slate-400 mb-6">Inizia aggiungendo la tua prima auto</p>
          <button id="addFirstCar" class="px-6 py-3 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-medium transition shadow-lg shadow-blue-500/30">
            Aggiungi Auto
          </button>
        </div>`;
      document.getElementById('addFirstCar').addEventListener('click', () => carDialog.showModal());
    } else {
      content.innerHTML = `
        <div class="space-y-4 animate-fade-in">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="p-4 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-600 text-white shadow-lg">
              <div class="text-2xl font-bold">${totalKm.toFixed(0)}</div>
              <div class="text-xs opacity-90">Km Totali</div>
            </div>
            <div class="p-4 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-600 text-white shadow-lg">
              <div class="text-2xl font-bold">${totalKwh.toFixed(1)}</div>
              <div class="text-xs opacity-90">kWh Totali</div>
            </div>
            <div class="p-4 rounded-2xl bg-gradient-to-br from-amber-500 to-amber-600 text-white shadow-lg">
              <div class="text-2xl font-bold">${totalFuel.toFixed(1)}L</div>
              <div class="text-xs opacity-90">Benzina</div>
            </div>
            <div class="p-4 rounded-2xl bg-gradient-to-br from-purple-500 to-purple-600 text-white shadow-lg">
              <div class="text-2xl font-bold">${avgConsumption}</div>
              <div class="text-xs opacity-90">kWh/100km</div>
            </div>
          </div>
          
          <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
            <h3 class="font-bold mb-3 flex items-center gap-2">
              <i data-lucide="clock" class="w-4 h-4 text-blue-500"></i>
              Viaggi Recenti
            </h3>
            ${recentTrips.length === 0 ? `
              <div class="text-center py-8 text-slate-500 dark:text-slate-400">
                <i data-lucide="route" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
                <p class="text-sm">Nessun viaggio registrato</p>
                <button id="addFirstTrip" class="mt-3 text-blue-500 text-sm font-medium">Aggiungi il primo</button>
              </div>
            ` : `
              <div class="space-y-2">
                ${recentTrips.map(t => {
                  const car = state.cars.find(c => c.id === t.carId);
                  return `
                    <div class="p-3 rounded-xl bg-slate-50 dark:bg-slate-900 flex items-center justify-between">
                      <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center">
                          <i data-lucide="calendar" class="w-5 h-5 text-blue-500"></i>
                        </div>
                        <div>
                          <div class="font-medium text-sm">${car?.name || 'Auto'}</div>
                          <div class="text-xs text-slate-500 dark:text-slate-400">${new Date(t.date).toLocaleDateString('it-IT')}</div>
                        </div>
                      </div>
                      <div class="text-right">
                        <div class="font-bold text-sm">${t.km} km</div>
                        <div class="text-xs text-slate-500 dark:text-slate-400">${t.kwh} kWh</div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            `}
          </div>
        </div>`;
      if(document.getElementById('addFirstTrip')) {
        document.getElementById('addFirstTrip').addEventListener('click', () => tripDialog.showModal());
      }
    }
  };
  
  const renderStorico = () => {
    fab.querySelector('i').setAttribute('data-lucide', 'plus');
    lucide.createIcons();
    const trips = state.trips || [];
    if(trips.length === 0) {
      content.innerHTML = `
        <div class="text-center py-16 animate-fade-in">
          <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 text-slate-300 dark:text-slate-700"></i>
          <h3 class="text-xl font-bold mb-2">Nessun viaggio</h3>
          <p class="text-slate-500 dark:text-slate-400 mb-6">Inizia a tracciare i tuoi spostamenti</p>
          <button id="addTripEmpty" class="px-6 py-3 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-medium transition">
            Nuovo Viaggio
          </button>
        </div>`;
      document.getElementById('addTripEmpty').addEventListener('click', () => tripDialog.showModal());
    } else {
      content.innerHTML = `
        <div class="space-y-3 animate-fade-in">
          ${trips.map(t => {
            const car = state.cars.find(c => c.id === t.carId);
            const cost = car ? (t.kwh * car.costKwh + t.fuel * 1.8).toFixed(2) : '0.00';
            return `
              <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 shadow-sm border border-slate-200 dark:border-slate-700">
                <div class="flex items-start justify-between mb-3">
                  <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center">
                      <i data-lucide="route" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                      <div class="font-bold">${car?.name || 'Auto eliminata'}</div>
                      <div class="text-xs text-slate-500 dark:text-slate-400">${new Date(t.date).toLocaleDateString('it-IT', {day:'numeric', month:'long', year:'numeric'})}</div>
                    </div>
                  </div>
                  <button onclick="deleteTrip('${t.id}')" class="p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
                <div class="grid grid-cols-3 gap-3 text-center">
                  <div class="p-2 rounded-lg bg-slate-50 dark:bg-slate-900">
                    <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">Distanza</div>
                    <div class="font-bold">${t.km} km</div>
                  </div>
                  <div class="p-2 rounded-lg bg-slate-50 dark:bg-slate-900">
                    <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">Elettrico</div>
                    <div class="font-bold">${t.kwh} kWh</div>
                  </div>
                  <div class="p-2 rounded-lg bg-slate-50 dark:bg-slate-900">
                    <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">Costo</div>
                    <div class="font-bold text-emerald-600 dark:text-emerald-400">€${cost}</div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>`;
    }
  };
  
  const renderAuto = () => {
    fab.querySelector('i').setAttribute('data-lucide', 'car');
    lucide.createIcons();
    if(state.cars.length === 0) {
      content.innerHTML = `
        <div class="text-center py-16 animate-fade-in">
          <i data-lucide="car" class="w-16 h-16 mx-auto mb-4 text-slate-300 dark:text-slate-700"></i>
          <h3 class="text-xl font-bold mb-2">Nessuna auto</h3>
          <p class="text-slate-500 dark:text-slate-400 mb-6">Aggiungi la tua prima auto ibrida</p>
          <button id="addCarEmpty" class="px-6 py-3 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-medium transition">
            Aggiungi Auto
          </button>
        </div>`;
      document.getElementById('addCarEmpty').addEventListener('click', () => carDialog.showModal());
    } else {
      content.innerHTML = `
        <div class="grid gap-4 animate-fade-in">
          ${state.cars.map(car => {
            const carTrips = (state.trips||[]).filter(t => t.carId === car.id);
            const totalKm = carTrips.reduce((a,b)=>a+b.km,0);
            return `
              <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <div class="flex items-start justify-between mb-4">
                  <div class="flex items-center gap-3">
                    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg">
                      <i data-lucide="car" class="w-7 h-7 text-white"></i>
                    </div>
                    <div>
                      <h3 class="font-bold text-lg">${car.name}</h3>
                      <p class="text-sm text-slate-500 dark:text-slate-400">${car.plate}</p>
                    </div>
                  </div>
                  <button onclick="deleteCar('${car.id}')" class="p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
                <div class="grid grid-cols-3 gap-3">
                  <div class="p-3 rounded-xl bg-slate-50 dark:bg-slate-900">
                    <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">Batteria</div>
                    <div class="font-bold">${car.battery} kWh</div>
                  </div>
                  <div class="p-3 rounded-xl bg-slate-50 dark:bg-slate-900">
                    <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">Costo/kWh</div>
                    <div class="font-bold">€${car.costKwh.toFixed(3)}</div>
                  </div>
                  <div class="p-3 rounded-xl bg-slate-50 dark:bg-slate-900">
                    <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">Km Totali</div>
                    <div class="font-bold">${totalKm.toFixed(0)}</div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>`;
    }
  };
  
  const renderBollette = () => {
    fab.querySelector('i').setAttribute('data-lucide', 'receipt');
    lucide.createIcons();
    if(state.bills.length === 0) {
      content.innerHTML = `
        <div class="text-center py-16 animate-fade-in">
          <i data-lucide="receipt" class="w-16 h-16 mx-auto mb-4 text-slate-300 dark:text-slate-700"></i>
          <h3 class="text-xl font-bold mb-2">Nessuna bolletta</h3>
          <p class="text-slate-500 dark:text-slate-400 mb-6">Registra le tue bollette elettriche</p>
          <button id="addBillEmpty" class="px-6 py-3 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-medium transition">
            Aggiungi Bolletta
          </button>
        </div>`;
      document.getElementById('addBillEmpty').addEventListener('click', () => billDialog.showModal());
    } else {
      const totalAmount = state.bills.reduce((a,b)=>a+b.amount,0);
      const totalKwh = state.bills.reduce((a,b)=>a+b.kwh,0);
      const avgCost = totalKwh > 0 ? totalAmount / totalKwh : 0;
      content.innerHTML = `
        <div class="space-y-4 animate-fade-in">
          <div class="bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl p-6 text-white shadow-xl">
            <div class="text-sm opacity-90 mb-2">Costo medio</div>
            <div class="text-4xl font-bold mb-1">€${avgCost.toFixed(3)}</div>
            <div class="text-sm opacity-90">per kWh</div>
            <div class="mt-4 pt-4 border-t border-white/20 grid grid-cols-2 gap-4 text-sm">
              <div>
                <div class="opacity-90">Totale speso</div>
                <div class="font-bold text-lg">€${totalAmount.toFixed(2)}</div>
              </div>
              <div>
                <div class="opacity-90">kWh totali</div>
                <div class="font-bold text-lg">${totalKwh.toFixed(0)}</div>
              </div>
            </div>
          </div>
          
          <div class="space-y-3">
            ${state.bills.map(bill => `
              <div class="bg-white dark:bg-slate-800 rounded-2xl p-4 shadow-sm border border-slate-200 dark:border-slate-700">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center">
                      <i data-lucide="receipt" class="w-6 h-6 text-emerald-600 dark:text-emerald-400"></i>
                    </div>
                    <div>
                      <div class="font-bold">€${bill.amount.toFixed(2)}</div>
                      <div class="text-xs text-slate-500 dark:text-slate-400">${new Date(bill.date).toLocaleDateString('it-IT')}</div>
                    </div>
                  </div>
                  <div class="flex items-center gap-3">
                    <div class="text-right">
                      <div class="font-bold">${bill.kwh} kWh</div>
                      <div class="text-xs text-slate-500 dark:text-slate-400">€${(bill.amount/bill.kwh).toFixed(3)}/kWh</div>
                    </div>
                    <button onclick="deleteBill('${bill.id}')" class="p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 transition">
                      <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }
  };
  
  const renderStatistiche = () => {
    fab.querySelector('i').setAttribute('data-lucide', 'bar-chart-3');
    lucide.createIcons();
    const trips = state.trips || [];
    if(trips.length === 0) {
      content.innerHTML = `
        <div class="text-center py-16 animate-fade-in">
          <i data-lucide="bar-chart-3" class="w-16 h-16 mx-auto mb-4 text-slate-300 dark:text-slate-700"></i>
          <h3 class="text-xl font-bold mb-2">Nessuna statistica</h3>
          <p class="text-slate-500 dark:text-slate-400">Aggiungi viaggi per vedere le statistiche</p>
        </div>`;
    } else {
      const totalKm = trips.reduce((a,b)=>a+b.km,0);
      const totalKwh = trips.reduce((a,b)=>a+b.kwh,0);
      const totalFuel = trips.reduce((a,b)=>a+b.fuel,0);
      const avgKwh100 = totalKm > 0 ? (totalKwh / totalKm * 100) : 0;
      const avgFuel100 = totalKm > 0 ? (totalFuel / totalKm * 100) : 0;
      const electricRatio = (totalKwh + totalFuel * 8.9) > 0 ? (totalKwh / (totalKwh + totalFuel * 8.9) * 100) : 0;
      
      const byMonth = {};
      trips.forEach(t => {
        const month = new Date(t.date).toLocaleDateString('it-IT', {month:'short', year:'numeric'});
        if(!byMonth[month]) byMonth[month] = {km:0, kwh:0, cost:0};
        byMonth[month].km += t.km;
        byMonth[month].kwh += t.kwh;
        const car = state.cars.find(c => c.id === t.carId);
        if(car) byMonth[month].cost += t.kwh * car.costKwh + t.fuel * 1.8;
      });
      
      content.innerHTML = `
        <div class="space-y-4 animate-fade-in">
          <div class="grid grid-cols-2 gap-3">
            <div class="p-5 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-600 text-white">
              <i data-lucide="zap" class="w-6 h-6 mb-2 opacity-90"></i>
              <div class="text-3xl font-bold mb-1">${avgKwh100.toFixed(1)}</div>
              <div class="text-xs opacity-90">kWh/100km medio</div>
            </div>
            <div class="p-5 rounded-2xl bg-gradient-to-br from-amber-500 to-amber-600 text-white">
              <i data-lucide="fuel" class="w-6 h-6 mb-2 opacity-90"></i>
              <div class="text-3xl font-bold mb-1">${avgFuel100.toFixed(1)}</div>
              <div class="text-xs opacity-90">L/100km medio</div>
            </div>
          </div>
          
          <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
            <h3 class="font-bold mb-4 flex items-center gap-2">
              <i data-lucide="pie-chart" class="w-4 h-4 text-blue-500"></i>
              Ripartizione Energia
            </h3>
            <div class="space-y-3">
              <div>
                <div class="flex justify-between text-sm mb-1">
                  <span>Elettrico</span>
                  <span class="font-bold">${electricRatio.toFixed(0)}%</span>
                </div>
                <div class="h-2 bg-slate-100 dark:bg-slate-900 rounded-full overflow-hidden">
                  <div class="h-full bg-gradient-to-r from-blue-500 to-emerald-500 rounded-full transition-all duration-500" style="width:${electricRatio}%"></div>
                </div>
              </div>
              <div>
                <div class="flex justify-between text-sm mb-1">
                  <span>Benzina</span>
                  <span class="font-bold">${(100-electricRatio).toFixed(0)}%</span>
                </div>
                <div class="h-2 bg-slate-100 dark:bg-slate-900 rounded-full overflow-hidden">
                  <div class="h-full bg-gradient-to-r from-amber-500 to-red-500 rounded-full transition-all duration-500" style="width:${100-electricRatio}%"></div>
                </div>
              </div>
            </div>
          </div>
          
          <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
            <h3 class="font-bold mb-4 flex items-center gap-2">
              <i data-lucide="calendar" class="w-4 h-4 text-blue-500"></i>
              Per Mese
            </h3>
            <div class="space-y-3">
              ${Object.entries(byMonth).map(([month, data]) => `
                <div class="p-3 rounded-xl bg-slate-50 dark:bg-slate-900">
                  <div class="flex justify-between items-center mb-2">
                    <span class="font-medium text-sm">${month}</span>
                    <span class="text-sm font-bold text-emerald-600 dark:text-emerald-400">€${data.cost.toFixed(2)}</span>
                  </div>
                  <div class="flex gap-4 text-xs text-slate-500 dark:text-slate-400">
                    <span>${data.km.toFixed(0)} km</span>
                    <span>${data.kwh.toFixed(1)} kWh</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>`;
    }
  };
  
  const renderTabs = () => {
    tabs.forEach(btn => {
      if(btn.dataset.tab === state.activeTab) {
        btn.classList.add('bg-white', 'dark:bg-slate-800', 'text-blue-600', 'dark:text-blue-400', 'shadow-sm');
        btn.classList.remove('text-slate-600', 'dark:text-slate-400', 'hover:bg-slate-100', 'dark:hover:bg-slate-800');
      } else {
        btn.classList.remove('bg-white', 'dark:bg-slate-800', 'text-blue-600', 'dark:text-blue-400', 'shadow-sm');
        btn.classList.add('text-slate-600', 'dark:text-slate-400', 'hover:bg-slate-100', 'dark:hover:bg-slate-800');
      }
    });
  };
  
  const updateTripCarOptions = () => {
    const select = document.querySelector('select[name="carId"]');
    select.innerHTML = '<option value="">Seleziona auto</option>' + 
      state.cars.map(car => `<option value="${car.id}">${car.name} (${car.plate})</option>`).join('');
    document.querySelector('input[name="date"]').value = new Date().toISOString().split('T')[0];
    document.querySelector('#billForm input[name="date"]').value = new Date().toISOString().split('T')[0];
  };
  
  const render = () => {
    renderTabs();
    updateTripCarOptions();
    switch(state.activeTab) {
      case 'storico': renderStorico(); break;
      case 'auto': renderAuto(); break;
      case 'bollette': renderBollette(); break;
      case 'statistiche': renderStatistiche(); break;
      default: renderNuovo();
    }
    lucide.createIcons();
  };
  
  render();
  
});
</script>
</body>
</html>
