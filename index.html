<meta name="theme-color" content="#14b8a6">
<style>
:root{
  --bg:#0c1218;--bg2:#111a24;--card:#17212d;--accent:#14b8a6;--accent2:#0d9488;
  --text:#e6f1ff;--text2:#94a3b8;--danger:#ef4444;--success:#22c55e;--border:#1e293b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px 20px}
header h1{font-size:20px;font-weight:700;background:linear-gradient(90deg,var(--accent) 0%,#22d3ee 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{font-size:12px;color:var(--text2);margin-top:2px}
.tabs{display:flex;gap:8px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:8px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent2)}
.tab:hover{border-color:var(--accent2)}
#content{padding:20px;max-width:800px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.card h2{font-size:18px;margin-bottom:16px;color:var(--accent)}
.label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;margin-top:14px}
.input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;transition:border .2s}
.input:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;padding:12px;border:0;border-radius:8px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;transition:all .2s}
.btn:hover{background:var(--accent2);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-secondary{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
.btn-danger{background:var(--danger)}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.3}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.list-item-left{flex:1}
.list-item-title{font-weight:600;font-size:15px}
.list-item-sub{font-size:13px;color:var(--text2);margin-top:2px}
.list-item-right{text-align:right}
.list-item-value{font-weight:700;color:var(--accent);font-size:16px}
.badge{display:inline-block;padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text2)}
#fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,#22d3ee 100%);color:#fff;border:0;font-size:28px;font-weight:300;cursor:pointer;box-shadow:0 8px 24px rgba(20,184,166,.4);transition:all .3s;z-index:100}
#fab:hover{transform:scale(1.1) rotate(90deg);box-shadow:0 12px 32px rgba(20,184,166,.5)}
.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:640px){.grid-2{grid-template-columns:1fr}#content{padding:16px}}
.stat{display:flex;flex-direction:column;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.stat-value{font-size:24px;font-weight:700;color:var(--accent)}
</style>
</head>
<body>
<script>
window.onerror=(msg,src,line)=>document.body.innerHTML=`<div style="color:red;padding:20px;font-family:monospace;white-space:pre-wrap">ERRORE: ${msg}\nRiga:${line}</div>`;

document.addEventListener('DOMContentLoaded',()=>{ main(); });

function main(){
  const S={load(){try{return JSON.parse(localStorage.getItem('hd33')||'{"cars":[],"bills":[],"refuels":[]}')}catch(e){return{cars:[],bills:[],refuels:[]}}},save(d){localStorage.setItem('hd33',JSON.stringify(d))}};
  
  let currentTab='Nuovo';
  
  const tabs=['Nuovo','Storico','Auto','Bollette'];
  
  function render(tab){
    if(tab) currentTab=tab;
    const d=S.load();
    
    const headerEl=document.getElementById('header');
    if(headerEl) headerEl.innerHTML=`<h1>HybridDrive Tracker</h1><p>v3.3 FINAL STABLE</p>`;
    
    const tabsEl=document.getElementById('tabs');
    if(tabsEl){
      tabsEl.innerHTML=tabs.map(t=>`<button class="tab ${t===currentTab?'active':''}" onclick="switchTab('${t}')">${t}</button>`).join('');
    }
    
    const contentEl=document.getElementById('content');
    if(!contentEl) return;
    
    if(currentTab==='Nuovo'){
      contentEl.innerHTML=renderNuovo(d);
    }else if(currentTab==='Storico'){
      contentEl.innerHTML=renderStorico(d);
    }else if(currentTab==='Auto'){
      contentEl.innerHTML=renderAuto(d);
    }else if(currentTab==='Bollette'){
      contentEl.innerHTML=renderBollette(d);
    }
    
    const fabEl=document.getElementById('fab');
    if(fabEl){
      fabEl.style.display=currentTab==='Nuovo'?'none':'block';
      fabEl.onclick=()=>switchTab('Nuovo');
    }
  }
  
  function renderNuovo(d){
    const hasCars=d.cars&&d.cars.length>0;
    return `
    <div class="card">
      <h2>Nuovo Rifornimento</h2>
      ${!hasCars?`<div class="empty"><div class="empty-icon">🚗</div><p>Nessuna auto registrata</p><button class="btn" onclick="addCar()">Aggiungi Auto</button></div>`:
      `<label class="label">Auto</label>
      <select id="carSelect" class="input">${d.cars.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
      <label class="label">Chilometri</label>
      <input id="kmInput" type="number" class="input" placeholder="es. 45230" step="0.1">
      <label class="label">Euro spesi</label>
      <input id="euroInput" type="number" class="input" placeholder="es. 45.50" step="0.01">
      <label class="label">Litri (opzionale)</label>
      <input id="litriInput" type="number" class="input" placeholder="es. 28.5" step="0.01">
      <button class="btn" onclick="saveRefuel()">Salva Rifornimento</button>`}
    </div>
    ${hasCars?renderStats(d):''}`;
  }
  
  function renderStats(d){
    const totalRefuels=d.refuels.length;
    const totalEuro=d.refuels.reduce((s,r)=>s+(r.euro||0),0);
    const totalKm=d.refuels.length>1?Math.max(...d.refuels.map(r=>r.km))-Math.min(...d.refuels.map(r=>r.km)):0;
    const avgCost=totalKm>0?(totalEuro/totalKm*100).toFixed(2):0;
    return `
    <div class="card">
      <h2>Statistiche</h2>
      <div class="grid grid-2">
        <div class="stat"><span class="stat-label">Rifornimenti</span><span class="stat-value">${totalRefuels}</span></div>
        <div class="stat"><span class="stat-label">Spesa Totale</span><span class="stat-value">€${totalEuro.toFixed(2)}</span></div>
        <div class="stat"><span class="stat-label">Km Percorsi</span><span class="stat-value">${totalKm.toFixed(0)}</span></div>
        <div class="stat"><span class="stat-label">€/100km</span><span class="stat-value">${avgCost}</span></div>
      </div>
    </div>`;
  }
  
  function renderStorico(d){
    const refuels=[...(d.refuels||[])].sort((a,b)=>b.date-a.date);
    if(refuels.length===0){
      return `<div class="card"><div class="empty"><div class="empty-icon">⛽</div><p>Nessun rifornimento registrato</p><button class="btn" onclick="switchTab('Nuovo')">Aggiungi il primo</button></div></div>`;
    }
    return `
    <div class="card">
      <h2>Storico Rifornimenti</h2>
      ${refuels.map(r=>{
        const car=d.cars.find(c=>c.id===r.carId);
        const date=new Date(r.date).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
        return `<div class="list-item">
          <div class="list-item-left">
            <div class="list-item-title">${car?.name||'Auto eliminata'}</div>
            <div class="list-item-sub">${r.km} km · ${date} ${r.litri?`· ${r.litri}L`:''}</div>
          </div>
          <div class="list-item-right">
            <div class="list-item-value">€${r.euro.toFixed(2)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }
  
  function renderAuto(d){
    if(!d.cars||d.cars.length===0){
      return `<div class="card"><div class="empty"><div class="empty-icon">🚗</div><p>Nessuna auto</p><button class="btn" onclick="addCar()">Aggiungi Auto</button></div></div>`;
    }
    return `
    <div class="card">
      <h2>Le Tue Auto</h2>
      ${d.cars.map(c=>{
        const refs=d.refuels.filter(r=>r.carId===c.id);
        return `<div class="list-item">
          <div class="list-item-left">
            <div class="list-item-title">${c.name}</div>
            <div class="list-item-sub">${refs.length} rifornimenti</div>
          </div>
          <div class="list-item-right">
            <button class="btn btn-danger" style="width:auto;padding:8px 12px;margin:0" onclick="deleteCar(${c.id})">Elimina</button>
          </div>
        </div>`;
      }).join('')}
      <button class="btn" onclick="addCar()">+ Aggiungi Auto</button>
    </div>`;
  }
  
  function renderBollette(d){
    const bills=d.bills||[];
    if(bills.length===0){
      return `<div class="card"><div class="empty"><div class="empty-icon">📄</div><p>Nessuna bolletta</p><button class="btn" onclick="addBill()">Aggiungi Bolletta</button></div></div>`;
    }
    return `
    <div class="card">
      <h2>Bollette Elettricità</h2>
      ${bills.map(b=>{
        const date=new Date(b.date).toLocaleDateString('it-IT',{month:'short',year:'numeric'});
        return `<div class="list-item">
          <div class="list-item-left">
            <div class="list-item-title">${date}</div>
            <div class="list-item-sub">${b.kwh} kWh</div>
          </div>
          <div class="list-item-right">
            <div class="list-item-value">€${b.euro.toFixed(2)}</div>
            <div class="list-item-sub">€${(b.euro/b.kwh).toFixed(3)}/kWh</div>
          </div>
        </div>`;
      }).join('')}
      <button class="btn" onclick="addBill()">+ Aggiungi Bolletta</button>
    </div>`;
  }
  
  window.switchTab=(t)=>render(t);
  
  window.addCar=()=>{
    const n=prompt('Nome auto (es. Toyota Yaris Hybrid)');
    if(n&&n.trim()){
      const d=S.load();
      if(!d.cars) d.cars=[];
      d.cars.push({id:Date.now(),name:n.trim()});
      S.save(d);
      render();
    }
  };
  
  window.deleteCar=(id)=>{
    if(confirm('Eliminare questa auto e tutti i suoi rifornimenti?')){
      const d=S.load();
      d.cars=d.cars.filter(c=>c.id!==id);
      d.refuels=d.refuels.filter(r=>r.carId!==id);
      S.save(d);
      render();
    }
  };
  
  window.saveRefuel=()=>{
    const carSel=document.getElementById('carSelect');
    const kmIn=document.getElementById('kmInput');
    const euroIn=document.getElementById('euroInput');
    const litriIn=document.getElementById('litriInput');
    
    if(!carSel||!kmIn||!euroIn) return alert('Errore elementi');
    
    const carId=+carSel.value;
    const km=+kmIn.value;
    const euro=+euroIn.value;
    const litri=litriIn.value?+litriIn.value:null;
    
    if(!km||!euro||km<0||euro<0){
      return alert('Inserisci km ed euro validi');
    }
    
    const d=S.load();
    if(!d.refuels) d.refuels=[];
    d.refuels.push({carId,km,euro,litri,date:Date.now()});
    S.save(d);
    alert('Rifornimento salvato!');
    kmIn.value='';
    euroIn.value='';
    if(litriIn) litriIn.value='';
    render('Storico');
  };
  
  window.addBill=()=>{
    const kwh=prompt('kWh consumati (es. 250)');
    if(!kwh||isNaN(+kwh)) return;
    const euro=prompt('Totale bolletta in € (es. 65.50)');
    if(!euro||isNaN(+euro)) return;
    const d=S.load();
    if(!d.bills) d.bills=[];
    d.bills.push({kwh:+kwh,euro:+euro,date:Date.now()});
    S.save(d);
    render();
  };
  
  // Initial UI skeleton
  document.body.innerHTML=`
    <header id="header"></header>
    <div id="tabs" class="tabs"></div>
    <div id="content"></div>
    <button id="fab">+</button>
  `;
  
  render();
}
</script>
</body>
</html>
